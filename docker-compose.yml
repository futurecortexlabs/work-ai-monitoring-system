services:
  ai-service:
    build: .
    container_name: work-ai-service
    restart: "no"

    volumes:
      - ./:/app

    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1

    ports:
      - "8000:8000"

    environment:
      - PYTHONUNBUFFERED=1

    command: python src/main.py